stage: sft
seed: 42
device: cpu

model:
  backbone_model_id: Qwen/Qwen3-VL-8B-Instruct
  lora_rank: 32
  lora_alpha: 64

training:
  epochs: 1
  batch_size: 1
  grad_accum_steps: 32       # effective batch = 1 * 32 * 4 GPUs = 128
  learning_rate: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_ratio: 0.03
  ignore_index: -100
  label_smoothing: 0.0
  gradient_checkpointing: true
  # Geometric pathway only — siglip_proj stays frozen at prealign initialization.
  # SVA still sees SigLIP tokens (they're meaningful from prealign) but doesn't update that mapping.
  # Phase 2 (train_sft.yaml) unfreezes siglip_proj once GATr+DINOv2 pathway has stabilized.
  trainable_groups:
    - gatr
    - dino_proj
    - sva
    - lora

data:
  dataset: habitat-frames
  frame_dir: data/frames/sft/
  datasets:
    - r2r-ce
  split: train
  num_workers: 8

environment:
  python: "3.12.2"
  torch: "2.5.1"
  transformers: "4.57.6"
  peft: "0.15.2"
  trl: "0.18.1"
  accelerate: "1.6.0"
  einops: "0.8.1"
  xformers: "0.0.29.post1"
  omegaconf: "2.3.0"
  numpy: "2.3.5"
  opt_einsum_commit: "1a984b7b75f3e532e7129f6aa13f7ddc3da66e10"
  gatr_install: "pip install -e REPOS/geometric-algebra-transformer --no-deps"
