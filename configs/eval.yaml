evaluation:
  seed: 42
  device: cpu
  include_supplementary_real_image_benchmarks: false

benchmarks:
  primary:
    - vlnce-r2r
    - vlnce-rxr
    - objectnav-hm3d
    - sqa3d
    - vsi-bench
    - navtrust
  supplementary:
    - whats-up
    - cv-bench

metrics:
  composite_weights:
    success_rate: 0.4
    spl: 0.4
    permutation_sensitivity: 0.2

permutation_test:
  enabled: true
  token_key: vision_tokens
  spatial_mask_key: spatial_mask
  num_permutations: 64
  expected_relative_drop_threshold: 0.15
  baseline_reference_drop_target: 0.03

ablations:
  enabled: true
  ids:
    - no-gridcell-rope3d
    - no-gatr
    - siglip-only
    - dinov2-only
    - no-rms-norm-matching
    - no-typed-attn-bias

environment:
  python: "3.12.2"
  torch: "2.5.1"
  transformers: "4.57.6"
  peft: "0.15.2"
  trl: "0.18.1"
  accelerate: "1.6.0"
  einops: "0.8.1"
  xformers: "0.0.29.post1"
  omegaconf: "2.3.0"
  numpy: "2.3.5"
  opt_einsum_commit: "1a984b7b75f3e532e7129f6aa13f7ddc3da66e10"
  gatr_install: "pip install -e REPOS/geometric-algebra-transformer --no-deps"
