stage: prealign
seed: 42
device: cpu

model:
  backbone_model_id: Qwen/Qwen3-VL-8B-Instruct
  siglip_model_id: google/siglip2-so400m-patch16-naflex
  dinov2_model_id: facebook/dinov2-large

training:
  epochs: 3
  batch_size: 1              # micro-batch per GPU (A100 40GB)
  grad_accum_steps: 64       # effective batch = 1 * 64 = 64
  learning_rate: 1.0e-3
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_ratio: 0.03         # 3% of total steps as linear warmup
  ignore_index: -100
  trainable_keywords:
    - projector

data:
  # Habitat-rendered frames with GT depth (NOT LLaVA-558K — no depth available).
  # Pre-render with scripts/render_training_frames.py before training.
  dataset: habitat-frames
  frame_dir: data/frames/prealign/
  datasets:
    - r2r-ce
    - rxr-ce
  split: train
  max_samples: 50000
  num_workers: 8

environment:
  python: "3.12.2"
  torch: "2.5.1"
  transformers: "4.57.6"
  peft: "0.15.2"
  trl: "0.18.1"
  accelerate: "1.6.0"
  einops: "0.8.1"
  xformers: "0.0.29.post1"
  omegaconf: "2.3.0"
  numpy: "2.3.5"
  opt_einsum_commit: "1a984b7b75f3e532e7129f6aa13f7ddc3da66e10"
  gatr_install: "pip install -e REPOS/geometric-algebra-transformer --no-deps"
