stage: sft
seed: 42
device: cpu

model:
  backbone_model_id: Qwen/Qwen3-VL-8B-Instruct
  lora_rank: 32
  lora_alpha: 64

training:
  epochs: 3
  batch_size: 32
  grad_accum_steps: 2
  learning_rate: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  ignore_index: -100
  label_smoothing: 0.0
  trainable_keywords:
    - projector
    - gatr
    - sva
    - cross_attn
    - lora

data:
  datasets:
    - r2r-ce
    - rxr-ce
    - sqa3d
  split: train
  num_workers: 8

environment:
  python: "3.12.2"
  torch: "2.5.1"
  transformers: "4.57.6"
  peft: "0.15.2"
  trl: "0.18.1"
  accelerate: "1.6.0"
  einops: "0.8.1"
  xformers: "0.0.29.post1"
  omegaconf: "2.3.0"
  numpy: "2.3.5"
  opt_einsum_commit: "1a984b7b75f3e532e7129f6aa13f7ddc3da66e10"
  gatr_install: "pip install -e REPOS/geometric-algebra-transformer --no-deps"
